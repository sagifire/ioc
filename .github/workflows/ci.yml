name: CI

on:
    push:
        branches:
            - master
    pull_request:

permissions:
    contents: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    quality:
        name: Quality gates
        runs-on: ubuntu-24.04

        steps:
            - name: Checkout
              uses: actions/checkout@v7
              with:
                  persist-credentials: false

            - name: Install pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: 11.7.0
                  run_install: false

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm build

            - name: Typecheck
              run: pnpm typecheck

            - name: Format
              run: pnpm format

            - name: Lint
              run: pnpm lint

            - name: Test
              run: pnpm test
